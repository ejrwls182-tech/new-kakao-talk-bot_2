<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="사다리타기">
<meta name="theme-color" content="#f5f4ef">
<title>사다리타기</title>
<style>
:root{
  --bg-page:#f5f4ef; --bg-card:#ffffff; --bg-soft:#ebeae3;
  --text:#1a1a18; --text-sec:#6b6a64; --text-ter:#9a988f;
  --border:rgba(0,0,0,0.10); --border-soft:rgba(0,0,0,0.06);
  --accent:#c0613a; --accent-soft:#f7ece6;
  --line:#cfccc3; --vline:#b7b4aa;
  --gold-bg:#faeeda; --gold-text:#9a5b0a; --gold-line:#e0a23a;
  --miss-bg:#eeede7; --miss-text:#8a887f;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg-page:#1b1b19; --bg-card:#262522; --bg-soft:#302f2b;
    --text:#f0efe8; --text-sec:#a8a69d; --text-ter:#76746c;
    --border:rgba(255,255,255,0.12); --border-soft:rgba(255,255,255,0.07);
    --accent:#e0875f; --accent-soft:#3a2a20;
    --line:#454339; --vline:#5a574c;
    --gold-bg:#463615; --gold-text:#f0c879; --gold-line:#9a7a2a;
    --miss-bg:#2f2e2a; --miss-text:#86847b;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif;
  background:var(--bg-page);color:var(--text);
  display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;
  padding:calc(var(--safe-top) + 14px) 0 calc(var(--safe-bottom) + 24px);
}
.wrap{padding:0 14px;max-width:680px;margin:0 auto;width:100%}
h1{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:2px}
.sub{font-size:12px;color:var(--text-sec);margin-bottom:14px}
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:14px 14px;margin-bottom:12px}
.controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center}
.ctl{display:flex;align-items:center;gap:8px}
.ctl-label{font-size:13px;color:var(--text-sec);font-weight:500;min-width:38px}
.stepper{display:flex;align-items:center;gap:0;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.stepper button{width:34px;height:34px;border:none;background:var(--bg-card);color:var(--text);font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.stepper button:active{background:var(--bg-soft)}
.stepper .val{min-width:34px;text-align:center;font-size:15px;font-weight:600;border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);height:34px;line-height:34px}
.btn{
  border:0.5px solid var(--border);background:var(--bg-card);color:var(--text);
  border-radius:10px;height:38px;padding:0 14px;font-size:13.5px;font-weight:500;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.1s;
}
.btn:active{transform:scale(.97)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.btn.primary:active{background:var(--accent)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.legend{display:flex;gap:14px;font-size:12px;color:var(--text-sec);margin-top:10px;align-items:center}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}

.board{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.board-inner{margin:0 auto}
.row-cells{display:flex}
.cell{flex:0 0 auto;text-align:center;display:flex;align-items:center;justify-content:center}
.name-btn{
  width:100%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);
  border-radius:9px;height:38px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  padding:0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.1s;
}
.name-btn:active{transform:scale(.95)}
.name-input{
  width:100%;height:38px;border:1px solid var(--accent);border-radius:9px;background:var(--bg-card);
  color:var(--text);font-size:13px;font-weight:600;text-align:center;font-family:inherit;padding:0 2px;
}
.res{
  width:100%;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;background:var(--bg-soft);color:var(--text-ter);transition:.15s;
}
.res.win{background:var(--gold-bg);color:var(--gold-text);box-shadow:inset 0 0 0 1.5px var(--gold-line)}
.res.miss{background:var(--miss-bg);color:var(--miss-text)}
svg.ladder{display:block}
.summary{margin-top:6px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 2px;border-bottom:0.5px solid var(--border-soft);font-size:14px}
.summary-row:last-child{border-bottom:none}
.pill{font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px}
.pill.win{background:var(--gold-bg);color:var(--gold-text)}
.pill.miss{background:var(--miss-bg);color:var(--miss-text)}
.hint{font-size:12px;color:var(--text-ter);text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>사다리타기</h1>
  <div class="sub">인원·당첨 수를 정하고, 리롤로 사다리를 바꿔보세요. 이름을 누르면 경로가 따라 내려갑니다.</div>

  <div class="card">
    <div class="controls">
      <div class="ctl">
        <span class="ctl-label">인원</span>
        <div class="stepper">
          <button id="nMinus" aria-label="인원 줄이기">−</button>
          <div class="val" id="nVal">6</div>
          <button id="nPlus" aria-label="인원 늘리기">+</button>
        </div>
      </div>
      <div class="ctl">
        <span class="ctl-label">당첨</span>
        <div class="stepper">
          <button id="wMinus" aria-label="당첨 줄이기">−</button>
          <div class="val" id="wVal">1</div>
          <button id="wPlus" aria-label="당첨 늘리기">+</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="reroll"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a8.5 8.5 0 1 1-2-8.9L23 10"/></svg>리롤</button>
      <button class="btn" id="revealAll"><svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>전체 공개</button>
      <button class="btn" id="clearTraces"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>초기화</button>
      <button class="btn" id="editToggle"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>이름 수정</button>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--gold-line)"></i>당첨</span>
      <span><i class="dot" style="background:var(--miss-text)"></i>꽝</span>
      <span id="winInfo" style="margin-left:auto;color:var(--text-ter)"></span>
    </div>
  </div>

  <div class="card" style="padding:12px 10px">
    <div class="board" id="board">
      <div class="board-inner" id="boardInner">
        <div class="row-cells" id="namesRow"></div>
        <svg class="ladder" id="svg"></svg>
        <div class="row-cells" id="resRow"></div>
      </div>
    </div>
    <div class="hint" id="hint">이름을 탭하면 결과가 공개됩니다</div>
  </div>

  <div class="card summary" id="summaryCard" style="display:none">
    <div id="summary"></div>
  </div>
</div>

<script>
const COL = 48, ROW = 22, TOP = 6, PAD_BOTTOM = 6;
const COLORS = ['#c0613a','#1d9e75','#378add','#7f77dd','#d4537e','#ba7517','#639922','#0f6e56','#993c1d','#185fa5','#534ab7','#993556','#854f0b','#3b6d11','#085041','#d85a30','#1d9e75','#7f77dd','#378add','#c0613a'];

let n = 6, w = 1;
let names = [];
let rungs = [];
let winners = new Set();
let revealed = new Set();      // bottom columns revealed
let traces = new Map();        // participant index -> {color}
let editMode = false;

const $ = s => document.querySelector(s);
const X = c => COL/2 + c*COL;

function rowsForN(nn){ return Math.max(10, Math.round(nn*1.7)); }

function generateRungs(nn){
  const rows = rowsForN(nn);
  const R = [];
  for(let r=0;r<rows;r++){
    const row = new Array(nn-1).fill(false);
    for(let c=0;c<nn-1;c++){
      if(c>0 && row[c-1]) continue;          // 인접 가로줄 금지
      if(Math.random()<0.45) row[c]=true;
    }
    R.push(row);
  }
  return R;
}

function trace(start){
  const rows = rungs.length;
  const pts = [[X(start), TOP]];
  let pos = start;
  for(let r=0;r<rows;r++){
    const y = TOP + (r+0.5)*ROW;
    let np = pos;
    if(pos>0 && rungs[r][pos-1]) np = pos-1;
    else if(pos<n-1 && rungs[r][pos]) np = pos+1;
    if(np!==pos){
      pts.push([X(pos), y]);
      pts.push([X(np), y]);
      pos = np;
    }
  }
  const bottomY = TOP + rows*ROW;
  pts.push([X(pos), bottomY]);
  return { end: pos, pts };
}

function pickWinners(){
  winners = new Set();
  const idx = [...Array(n).keys()];
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  for(let i=0;i<w;i++) winners.add(idx[i]);
}

function resetNames(){
  const old = names.slice();
  names = [];
  for(let i=0;i<n;i++) names[i] = (old[i]!==undefined && old[i]!=='') ? old[i] : String(i+1);
}

function newRound(){
  resetNames();
  pickWinners();
  rungs = generateRungs(n);
  revealed = new Set();
  traces = new Map();
  render();
}

function reroll(){
  rungs = generateRungs(n);
  revealed = new Set();
  traces = new Map();
  render();
}

function svgEl(tag, attrs){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function render(){
  const rows = rungs.length;
  const innerW = n*COL;
  const bottomY = TOP + rows*ROW;
  const h = bottomY + PAD_BOTTOM;

  $('#boardInner').style.width = innerW + 'px';
  const svg = $('#svg');
  svg.setAttribute('viewBox', `0 0 ${innerW} ${h}`);
  svg.setAttribute('width', innerW);
  svg.setAttribute('height', h);
  svg.innerHTML = '';

  // 세로줄
  for(let c=0;c<n;c++){
    svg.appendChild(svgEl('line', {x1:X(c), y1:TOP, x2:X(c), y2:bottomY, stroke:'var(--vline)', 'stroke-width':2, 'stroke-linecap':'round'}));
  }
  // 가로줄
  for(let r=0;r<rows;r++){
    const y = TOP + (r+0.5)*ROW;
    for(let c=0;c<n-1;c++){
      if(rungs[r][c]) svg.appendChild(svgEl('line', {x1:X(c), y1:y, x2:X(c+1), y2:y, stroke:'var(--line)', 'stroke-width':2.5, 'stroke-linecap':'round'}));
    }
  }
  // 경로
  for(const [p, info] of traces){
    const {pts} = trace(p);
    const poly = svgEl('polyline', {points: pts.map(q=>q.join(',')).join(' '), fill:'none', stroke:info.color, 'stroke-width':3.5, 'stroke-linecap':'round', 'stroke-linejoin':'round', opacity:0.95});
    const len = polyLen(pts);
    poly.setAttribute('stroke-dasharray', len);
    poly.setAttribute('stroke-dashoffset', len);
    svg.appendChild(poly);
    requestAnimationFrame(()=>{ poly.style.transition='stroke-dashoffset .6s ease'; poly.setAttribute('stroke-dashoffset', 0); });
  }

  renderNames();
  renderResults();
  renderSummary();
  $('#winInfo').textContent = `총 ${n}명 · 당첨 ${w}`;
}

function polyLen(pts){
  let L=0;
  for(let i=1;i<pts.length;i++){ L += Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1]); }
  return Math.round(L);
}

function outcomeFor(p){ return winners.has(trace(p).end); }

function renderNames(){
  const row = $('#namesRow');
  row.innerHTML = '';
  for(let i=0;i<n;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.flex = `0 0 ${COL}px`;
    cell.style.padding = '0 3px 8px';
    if(editMode){
      const inp = document.createElement('input');
      inp.className = 'name-input';
      inp.value = names[i];
      inp.maxLength = 6;
      inp.oninput = e => { names[i] = e.target.value; };
      cell.appendChild(inp);
    } else {
      const b = document.createElement('button');
      b.className = 'name-btn';
      b.textContent = names[i] || (i+1);
      const traced = traces.has(i);
      if(traced){
        b.style.borderColor = traces.get(i).color;
        b.style.color = traces.get(i).color;
      }
      b.onclick = ()=> toggleTrace(i);
      cell.appendChild(b);
    }
    row.appendChild(cell);
  }
}

function renderResults(){
  const row = $('#resRow');
  row.innerHTML = '';
  for(let c=0;c<n;c++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.flex = `0 0 ${COL}px`;
    cell.style.padding = '8px 3px 0';
    const d = document.createElement('div');
    if(revealed.has(c)){
      const win = winners.has(c);
      d.className = 'res ' + (win?'win':'miss');
      d.textContent = win ? '당첨' : '꽝';
    } else {
      d.className = 'res';
      d.textContent = '?';
    }
    cell.appendChild(d);
    row.appendChild(cell);
  }
}

function renderSummary(){
  if(traces.size===0){ $('#summaryCard').style.display='none'; return; }
  $('#summaryCard').style.display='block';
  const box = $('#summary');
  box.innerHTML = '';
  const entries = [...traces.keys()].sort((a,b)=>a-b);
  for(const p of entries){
    const win = outcomeFor(p);
    const r = document.createElement('div');
    r.className = 'summary-row';
    const left = document.createElement('span');
    left.innerHTML = `<i class="dot" style="background:${traces.get(p).color};margin-right:8px"></i>${esc(names[p]||String(p+1))}`;
    const right = document.createElement('span');
    right.className = 'pill ' + (win?'win':'miss');
    right.textContent = win ? '당첨' : '꽝';
    r.appendChild(left); r.appendChild(right);
    box.appendChild(r);
  }
}

function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function toggleTrace(p){
  if(editMode) return;
  if(traces.has(p)){
    traces.delete(p);
  } else {
    traces.set(p, { color: COLORS[p % COLORS.length] });
    const end = trace(p).end;
    revealed.add(end);
  }
  render();
  $('#hint').textContent = traces.size ? '다시 탭하면 경로가 사라져요' : '이름을 탭하면 결과가 공개됩니다';
}

function revealAll(){
  for(let p=0;p<n;p++){
    if(!traces.has(p)) traces.set(p, { color: COLORS[p % COLORS.length] });
    revealed.add(trace(p).end);
  }
  render();
  $('#hint').textContent = '전체 결과 공개됨';
}

function clearTraces(){
  traces = new Map();
  revealed = new Set();
  render();
  $('#hint').textContent = '이름을 탭하면 결과가 공개됩니다';
}

function setN(v){
  n = Math.max(2, Math.min(20, v));
  if(w > n-1) w = n-1;
  $('#nVal').textContent = n;
  $('#wVal').textContent = w;
  newRound();
}
function setW(v){
  w = Math.max(1, Math.min(n-1, v));
  $('#wVal').textContent = w;
  pickWinners();
  revealed = new Set();
  traces = new Map();
  render();
}

$('#nMinus').onclick = ()=> setN(n-1);
$('#nPlus').onclick  = ()=> setN(n+1);
$('#wMinus').onclick = ()=> setW(w-1);
$('#wPlus').onclick  = ()=> setW(w+1);
$('#reroll').onclick = reroll;
$('#revealAll').onclick = revealAll;
$('#clearTraces').onclick = clearTraces;
$('#editToggle').onclick = ()=>{
  editMode = !editMode;
  $('#editToggle').classList.toggle('primary', editMode);
  $('#editToggle').lastChild.textContent = editMode ? '완료' : '이름 수정';
  $('#hint').textContent = editMode ? '칸을 눌러 이름을 입력하세요' : '이름을 탭하면 결과가 공개됩니다';
  render();
};

newRound();
</script>
</body>
</html>
