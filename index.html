<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="신임관리자과정">
<meta name="theme-color" content="#f5f4ef">
<title>제71기 신임관리자과정</title>
<style>
:root{
  --bg-page:#f5f4ef; --bg-card:#ffffff; --bg-soft:#eeee7;
  --bg-soft:#ebeae3;
  --text:#1a1a18; --text-sec:#6b6a64; --text-ter:#9a988f;
  --border:rgba(0,0,0,0.10); --border-soft:rgba(0,0,0,0.06);
  --accent:#c0613a; --accent-soft:#f7ece6;
  --warn-bg:#faeeda; --warn-text:#854f0b;
  --line:#cfccc3; --vline:#b7b4aa;
  --gold-bg:#faeeda; --gold-text:#9a5b0a; --gold-line:#e0a23a;
  --miss-bg:#eeede7; --miss-text:#8a887f;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg-page:#1b1b19; --bg-card:#262522; --bg-soft:#302f2b;
    --text:#f0efe8; --text-sec:#a8a69d; --text-ter:#76746c;
    --border:rgba(255,255,255,0.12); --border-soft:rgba(255,255,255,0.07);
    --accent:#e0875f; --accent-soft:#3a2a20;
    --warn-bg:#463615; --warn-text:#f0c879;
    --line:#454339; --vline:#5a574c;
    --gold-bg:#463615; --gold-text:#f0c879; --gold-line:#9a7a2a;
    --miss-bg:#2f2e2a; --miss-text:#86847b;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif;
  background:var(--bg-page); color:var(--text);
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
.header{
  background:var(--bg-card); border-bottom:0.5px solid var(--border);
  padding:calc(var(--safe-top) + 14px) 20px 12px; flex-shrink:0;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.header-title{font-size:12px;color:var(--text-sec);font-weight:500;letter-spacing:-0.01em}
.today-btn{
  background:none;border:0.5px solid var(--border);border-radius:9px;height:28px;
  padding:0 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;
  color:var(--text-sec);cursor:pointer;font-family:inherit;transition:background .12s;
}
.today-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.today-btn:active{background:var(--bg-soft)}
.today-btn.active{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.header-date{font-size:18px;font-weight:600;letter-spacing:-0.02em;margin-bottom:10px}
.header-date .wd{color:var(--accent);margin-left:5px}
.datestrip{display:flex;gap:6px;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;margin:0 -20px;padding:1px 20px 2px}
.datestrip::-webkit-scrollbar{display:none}
.datestrip{scrollbar-width:none}
.dp{
  flex-shrink:0;width:46px;padding:6px 0 5px;border-radius:12px;cursor:pointer;
  border:0.5px solid var(--border);background:var(--bg-card);
  display:flex;flex-direction:column;align-items:center;gap:1px;font-family:inherit;transition:.1s;
}
.dp:active{transform:scale(.95)}
.dp-wd{font-size:11px;color:var(--text-ter);font-weight:500}
.dp-wd.sun{color:#d8635c}.dp-wd.sat{color:#4a8fcc}
.dp-dn{font-size:16px;font-weight:600;color:var(--text);line-height:1.1}
.dp-rel{font-size:9px;font-weight:600;color:var(--accent);min-height:11px;line-height:1.1}
.dp.active{background:var(--accent);border-color:transparent}
.dp.active .dp-wd,.dp.active .dp-dn,.dp.active .dp-rel{color:#fff}
.tabs{display:flex;background:var(--bg-card);border-bottom:0.5px solid var(--border);flex-shrink:0}
.tab{
  flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:11px;color:var(--text-ter);cursor:pointer;
  border-bottom:2px solid transparent;transition:color .12s;font-weight:500;
}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab.active svg{stroke:var(--accent)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--safe-bottom) + 24px)}
.pane{display:none;flex-direction:column;gap:11px}
.pane.active{display:flex}
.card{
  background:var(--bg-card);border:0.5px solid var(--border);
  border-radius:14px;padding:14px 16px;
}
.card-head{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.card-head svg{width:15px;height:15px;stroke:var(--text-sec);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-count{margin-left:auto;font-size:11px;color:var(--text-ter);font-weight:500}
.session{padding:9px 0;border-bottom:0.5px solid var(--border-soft)}
.session:last-child{border-bottom:none;padding-bottom:0}
.session:first-of-type{padding-top:0}
.session-name{font-size:14px;line-height:1.45;font-weight:450;letter-spacing:-0.01em}
.session-time{font-size:12px;color:var(--text-sec);margin-top:3px;display:flex;align-items:center;gap:4px}
.session-time svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}
.meal-row{display:flex;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border-soft)}
.meal-row:last-child{border-bottom:none;padding-bottom:0}
.meal-row:first-child{padding-top:0}
.meal-emoji{font-size:21px;line-height:1.2;flex-shrink:0;width:24px;text-align:center}
.meal-label{font-size:11px;color:var(--text-ter);font-weight:600;margin-bottom:3px;letter-spacing:0.01em}
.meal-text{font-size:13.5px;line-height:1.5;letter-spacing:-0.01em}
.deadline-row{display:flex;gap:11px;padding:10px 0;border-bottom:0.5px solid var(--border-soft);align-items:flex-start}
.deadline-row:last-child{border-bottom:none;padding-bottom:0}
.deadline-row:first-child{padding-top:0}
.dl-date{font-size:11px;color:var(--text-sec);font-weight:600;min-width:54px;padding-top:1px}
.dl-text{font-size:13.5px;line-height:1.45;flex:1;letter-spacing:-0.01em}
.badge{
  display:inline-block;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:600;
  background:var(--warn-bg);color:var(--warn-text);margin-top:5px;
}
.empty{text-align:center;padding:40px 16px;color:var(--text-ter);font-size:14px}
.empty svg{width:34px;height:34px;stroke:var(--text-ter);fill:none;stroke-width:1.4;margin-bottom:10px;opacity:.6}
.seg{display:flex;gap:4px;background:var(--bg-soft);border-radius:10px;padding:3px;margin-bottom:12px}
.seg-btn{
  flex:1;border:none;background:none;padding:7px 0;border-radius:7px;font-size:12.5px;
  font-weight:500;color:var(--text-sec);cursor:pointer;font-family:inherit;transition:.12s;
}
.seg-btn.active{background:var(--bg-card);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.day-group{margin-bottom:2px}
.day-group-head{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:7px;display:flex;align-items:baseline;gap:6px}
.day-group-head .dg-wd{color:var(--text-ter);font-weight:500}
.loading{text-align:center;padding:60px 0;color:var(--text-ter);font-size:14px}
.skeleton{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

.ld-intro{font-size:12px;color:var(--text-sec);margin:-2px 2px 10px}
.ld-controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center}
.ld-ctl{display:flex;align-items:center;gap:8px}
.ld-ctl-label{font-size:13px;color:var(--text-sec);font-weight:500;min-width:34px}
.ld-stepper{display:flex;align-items:center;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.ld-stepper button{width:34px;height:34px;border:none;background:var(--bg-card);color:var(--text);font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.ld-stepper button:active{background:var(--bg-soft)}
.ld-val{min-width:34px;text-align:center;font-size:15px;font-weight:600;border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);height:34px;line-height:34px}
.ld-btn{border:0.5px solid var(--border);background:var(--bg-card);color:var(--text);border-radius:10px;height:38px;padding:0 14px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.1s}
.ld-btn:active{transform:scale(.97)}
.ld-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ld-btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.ld-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.ld-legend{display:flex;gap:14px;font-size:12px;color:var(--text-sec);margin-top:10px;align-items:center}
.ld-legend span{display:inline-flex;align-items:center;gap:5px}
.ld-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.ld-board{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.ld-board-inner{margin:0 auto}
.ld-row{display:flex}
.ld-cell{flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.ld-name-btn{width:100%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);border-radius:9px;height:38px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.1s}
.ld-name-btn:active{transform:scale(.95)}
.ld-name-input{width:100%;height:38px;border:1px solid var(--accent);border-radius:9px;background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;text-align:center;font-family:inherit;padding:0 2px}
.ld-res{width:100%;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--bg-soft);color:var(--text-ter);transition:.15s}
.ld-res.win{background:var(--gold-bg);color:var(--gold-text);box-shadow:inset 0 0 0 1.5px var(--gold-line)}
.ld-res.miss{background:var(--miss-bg);color:var(--miss-text)}
.ld-svg{display:block}
.ld-summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 2px;border-bottom:0.5px solid var(--border-soft);font-size:14px}
.ld-summary-row:last-child{border-bottom:none}
.ld-pill{font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px}
.ld-pill.win{background:var(--gold-bg);color:var(--gold-text)}
.ld-pill.miss{background:var(--miss-bg);color:var(--miss-text)}
.ld-hint{font-size:12px;color:var(--text-ter);text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-title">제71기 신임관리자과정</span>
    <button class="today-btn" id="todayBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="15" x2="12.01" y2="15"/></svg>오늘로</button>
  </div>
  <div class="header-date" id="headerDate">불러오는 중…</div>
  <div class="datestrip" id="datestrip"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="lecture">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    강의
  </div>
  <div class="tab" data-tab="meal">
    <svg viewBox="0 0 24 24"><path d="M3 11h18a8 8 0 0 1-8 8H11a8 8 0 0 1-8-8z"/><line x1="12" y1="3" x2="12" y2="7"/><line x1="8" y1="4" x2="8" y2="7"/><line x1="16" y1="4" x2="16" y2="7"/></svg>
    식단
  </div>
  <div class="tab" data-tab="todo">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    할일
  </div>
  <div class="tab" data-tab="ladder">
    <svg viewBox="0 0 24 24"><line x1="7" y1="3" x2="7" y2="21"/><line x1="17" y1="3" x2="17" y2="21"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="15" x2="17" y2="15"/></svg>
    사다리
  </div>
</div>

<div class="content">
  <div class="pane active" id="pane-lecture"><div class="loading skeleton">불러오는 중…</div></div>
  <div class="pane" id="pane-meal"></div>
  <div class="pane" id="pane-todo"></div>
  <div class="pane" id="pane-ladder">
    <div class="ld-intro">인원·당첨 수를 정하고, 리롤로 사다리를 바꿔보세요. 이름을 누르면 결과가 공개됩니다.</div>
    <div class="card">
      <div class="ld-controls">
        <div class="ld-ctl">
          <span class="ld-ctl-label">인원</span>
          <div class="ld-stepper">
            <button id="ld-nMinus" aria-label="인원 줄이기">−</button>
            <div class="ld-val" id="ld-nVal">6</div>
            <button id="ld-nPlus" aria-label="인원 늘리기">+</button>
          </div>
        </div>
        <div class="ld-ctl">
          <span class="ld-ctl-label">당첨</span>
          <div class="ld-stepper">
            <button id="ld-wMinus" aria-label="당첨 줄이기">−</button>
            <div class="ld-val" id="ld-wVal">1</div>
            <button id="ld-wPlus" aria-label="당첨 늘리기">+</button>
          </div>
        </div>
      </div>
      <div class="ld-btn-row">
        <button class="ld-btn primary" id="ld-reroll"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a8.5 8.5 0 1 1-2-8.9L23 10"/></svg>리롤</button>
        <button class="ld-btn" id="ld-revealAll"><svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>전체 공개</button>
        <button class="ld-btn" id="ld-clear"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>초기화</button>
        <button class="ld-btn" id="ld-edit"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg><span>이름 수정</span></button>
      </div>
      <div class="ld-legend">
        <span><i class="ld-dot" style="background:var(--gold-line)"></i>당첨</span>
        <span><i class="ld-dot" style="background:var(--miss-text)"></i>꽝</span>
        <span id="ld-winInfo" style="margin-left:auto;color:var(--text-ter)"></span>
      </div>
    </div>
    <div class="card" style="padding:12px 10px">
      <div class="ld-board" id="ld-board">
        <div class="ld-board-inner" id="ld-boardInner">
          <div class="ld-row" id="ld-namesRow"></div>
          <svg class="ld-svg" id="ld-svg"></svg>
          <div class="ld-row" id="ld-resRow"></div>
        </div>
      </div>
      <div class="ld-hint" id="ld-hint">이름을 탭하면 결과가 공개됩니다</div>
    </div>
    <div class="card" id="ld-summaryCard" style="display:none">
      <div id="ld-summary"></div>
    </div>
  </div>
</div>

<script>
const WD = ['일','월','화','수','목','금','토'];
let DATA = null;
let cur = null;
let serverToday = null;

const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2,'0');
const keyOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseKey = s => { const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); };
const sameDay = (a,b) => keyOf(a)===keyOf(b);
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const mondayOf = d => { const x=new Date(d); const wd=(x.getDay()+6)%7; x.setDate(x.getDate()-wd); return x; };
const esc = s => s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
// 한국시간(KST, UTC+9) 기준 오늘 날짜를 로컬 자정 Date로 반환
const kstToday = () => {
  const now = new Date();
  const kst = new Date(now.getTime() + now.getTimezoneOffset()*60000 + 9*3600000);
  return new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
};

function isDeadline(s){ return s.includes('제출') || s.includes('마감'); }

function parseSession(s){
  const tm = s.match(/(\d{1,2}:\d{2}\s*~\s*\d{1,2}:\d{2})/);
  let time = tm ? tm[1].replace(/\s+/g,'') : '';
  let name = s;
  if(tm) name = s.replace(tm[1],'');
  name = name.replace(/\(\s*[,)]?\s*\)/g,'').replace(/[\s,(]+$/,'').trim();
  if(!name) name = s;
  return { name, time };
}

function renderDateHeader(){
  let rel = '';
  if(serverToday){
    const diff = Math.round((cur - serverToday)/86400000);
    rel = diff===0?' · 오늘':diff===1?' · 내일':diff===2?' · 모레':diff===-1?' · 어제':'';
  }
  $('#headerDate').innerHTML = `${cur.getMonth()+1}월 ${cur.getDate()}일<span class="wd">${WD[cur.getDay()]}요일</span><span style="font-size:13px;color:var(--text-ter);font-weight:500">${rel}</span>`;
  $('#todayBtn').classList.toggle('active', serverToday && sameDay(cur, serverToday));
  updateStrip();
}

function buildStrip(){
  const strip = $('#datestrip');
  strip.innerHTML = '';
  const start = addDays(serverToday, -3);
  for(let i=0;i<38;i++){
    const d = addDays(start, i);
    const diff = Math.round((d - serverToday)/86400000);
    const rel = diff===0?'오늘':diff===1?'내일':diff===2?'모레':'';
    const wdCls = d.getDay()===0?'sun':d.getDay()===6?'sat':'';
    const el = document.createElement('button');
    el.className = 'dp';
    el.dataset.k = keyOf(d);
    el.innerHTML = `<div class="dp-wd ${wdCls}">${WD[d.getDay()]}</div><div class="dp-dn">${d.getDate()}</div><div class="dp-rel">${rel}</div>`;
    el.onclick = ()=>{ cur = new Date(d); renderAll(); };
    strip.appendChild(el);
  }
}

function updateStrip(){
  const k = keyOf(cur);
  let active = null;
  $('#datestrip').querySelectorAll('.dp').forEach(el=>{
    const on = el.dataset.k === k;
    el.classList.toggle('active', on);
    if(on) active = el;
  });
  if(active){
    const strip = $('#datestrip');
    strip.scrollTo({ left: active.offsetLeft - strip.clientWidth/2 + active.clientWidth/2, behavior:'smooth' });
  }
}

function emptyBlock(text, icon){
  const ic = icon || '<circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  return `<div class="empty"><svg viewBox="0 0 24 24">${ic}</svg><div>${text}</div></div>`;
}

function renderLecture(){
  const sessions = DATA.schedule[keyOf(cur)];
  let html = '';
  if(sessions === undefined){
    html = emptyBlock('교육 기간에 포함되지 않은 날짜입니다.');
  } else {
    const lectures = sessions.filter(s=>!isDeadline(s));
    const deadlines = sessions.filter(isDeadline);
    if(lectures.length === 0 && deadlines.length === 0){
      html = emptyBlock('이 날은 별도의 강의가 없습니다.');
    } else {
      if(lectures.length){
        html += `<div class="card"><div class="card-head">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="card-title">강의 일정</span><span class="card-count">${lectures.length}개</span></div>`;
        for(const s of lectures){
          const {name,time} = parseSession(s);
          html += `<div class="session"><div class="session-name">${esc(name)}</div>`;
          if(time) html += `<div class="session-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>${esc(time)}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
      }
      if(deadlines.length){
        html += `<div class="card"><div class="card-head">
          <svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9L2 18a2 2 0 0 0 1.7 3h16.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
          <span class="card-title">오늘 마감</span></div>`;
        for(const s of deadlines){
          html += `<div class="session"><div class="session-name">${esc(s)}</div></div>`;
        }
        html += `</div>`;
      }
    }
  }

  const upcoming = upcomingDeadlines(cur, 14);
  if(upcoming.length){
    html += `<div class="card"><div class="card-head">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      <span class="card-title">다가오는 마감</span></div>`;
    for(const u of upcoming){
      const dd = u.diff===0 ? 'D-day' : `D-${u.diff}`;
      html += `<div class="deadline-row"><div class="dl-date">${u.md}<br><span style="color:var(--text-ter);font-weight:500">${WD[u.date.getDay()]}</span></div>
        <div class="dl-text">${esc(u.text)}<br><span class="badge">${dd}</span></div></div>`;
    }
    html += `</div>`;
  }
  $('#pane-lecture').innerHTML = html;
}

function upcomingDeadlines(from, days){
  const out = [];
  for(let i=1;i<=days;i++){
    const d = addDays(from,i);
    const ss = DATA.schedule[keyOf(d)];
    if(!ss) continue;
    for(const s of ss){
      if(isDeadline(s)) out.push({date:d, diff:i, md:`${d.getMonth()+1}.${pad(d.getDate())}`, text:s});
    }
  }
  return out.slice(0,5);
}

let mealMode = 'day';
function renderMeal(){
  let html = `<div class="seg">
    <button class="seg-btn ${mealMode==='day'?'active':''}" data-m="day">하루</button>
    <button class="seg-btn ${mealMode==='week'?'active':''}" data-m="week">이번 주</button></div>`;

  const ICONS = {breakfast:'🌅',lunch:'☀️',dinner:'🌙'};
  const LABELS = {breakfast:'아침',lunch:'점심',dinner:'저녁'};
  const ORDER = ['breakfast','lunch','dinner'];

  if(mealMode === 'day'){
    const m = DATA.meals[keyOf(cur)];
    if(!m){
      html += emptyBlock('이 날의 식단 정보가 없습니다.', '<path d="M3 11h18a8 8 0 0 1-8 8H11a8 8 0 0 1-8-8z"/><line x1="12" y1="3" x2="12" y2="7"/>');
    } else {
      html += `<div class="card">`;
      for(const k of ORDER){
        if(!m[k]) continue;
        html += `<div class="meal-row"><div class="meal-emoji">${ICONS[k]}</div>
          <div><div class="meal-label">${LABELS[k]}</div><div class="meal-text">${esc(m[k])}</div></div></div>`;
      }
      html += `</div>`;
    }
  } else {
    const mon = mondayOf(cur);
    let any = false;
    for(let i=0;i<5;i++){
      const d = addDays(mon,i);
      const m = DATA.meals[keyOf(d)];
      if(!m) continue;
      any = true;
      html += `<div class="card"><div class="card-head">
        <span class="card-title">${d.getMonth()+1}.${pad(d.getDate())}</span>
        <span style="color:var(--accent);font-weight:600;font-size:13px">${WD[d.getDay()]}</span></div>`;
      for(const k of ORDER){
        if(!m[k]) continue;
        html += `<div class="meal-row"><div class="meal-emoji">${ICONS[k]}</div>
          <div><div class="meal-label">${LABELS[k]}</div><div class="meal-text">${esc(m[k])}</div></div></div>`;
      }
      html += `</div>`;
    }
    if(!any) html += emptyBlock('이번 주 식단 정보가 아직 없습니다.', '<path d="M3 11h18a8 8 0 0 1-8 8H11a8 8 0 0 1-8-8z"/>');
  }
  $('#pane-meal').innerHTML = html;
  $('#pane-meal').querySelectorAll('.seg-btn').forEach(b=>{
    b.onclick = ()=>{ mealMode = b.dataset.m; renderMeal(); };
  });
}

function weekDeadlines(weekDate){
  const mon = mondayOf(weekDate);
  const out = [];
  const seen = new Set();
  for(let i=0;i<7;i++){
    const d = addDays(mon,i);
    const ss = DATA.schedule[keyOf(d)];
    if(!ss) continue;
    for(const s of ss){
      if(isDeadline(s) && !seen.has(s)){
        seen.add(s);
        out.push({md:`${d.getMonth()+1}.${pad(d.getDate())}`, wd:WD[d.getDay()], text:s});
      }
    }
  }
  return {mon, sun:addDays(mon,6), items:out};
}

function renderTodo(){
  let html = '';
  const blocks = [
    {label:'이번 주', wk: weekDeadlines(cur)},
    {label:'다음 주', wk: weekDeadlines(addDays(cur,7))},
  ];
  for(const b of blocks){
    const range = `${b.wk.mon.getMonth()+1}.${pad(b.wk.mon.getDate())}~${b.wk.sun.getMonth()+1}.${pad(b.wk.sun.getDate())}`;
    html += `<div class="card"><div class="card-head">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="card-title">${b.label}</span><span class="card-count">${range}</span></div>`;
    if(b.wk.items.length === 0){
      html += `<div style="font-size:13px;color:var(--text-ter);padding:6px 0">제출/마감 일정이 없습니다.</div>`;
    } else {
      for(const it of b.wk.items){
        html += `<div class="deadline-row"><div class="dl-date">${it.md}<br><span style="color:var(--text-ter);font-weight:500">${it.wd}</span></div>
          <div class="dl-text">${esc(it.text)}</div></div>`;
      }
    }
    html += `</div>`;
  }
  $('#pane-todo').innerHTML = html;
}

let activeTab = 'lecture';
function renderAll(){
  const isLadder = activeTab==='ladder';
  $('#headerDate').style.display = isLadder ? 'none' : '';
  $('#datestrip').style.display = isLadder ? 'none' : '';
  $('#todayBtn').style.display = isLadder ? 'none' : '';
  if(isLadder) return;
  renderDateHeader();
  if(activeTab==='lecture') renderLecture();
  else if(activeTab==='meal') renderMeal();
  else renderTodo();
}

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));

$('#todayBtn').onclick = ()=>{ cur = new Date(serverToday); renderAll(); };

// ---------------------------------------------------------------------------
// 사다리타기 탭 (독립 스코프)
// ---------------------------------------------------------------------------
(function(){
  const $ = s => document.querySelector(s);
  const COL = 48, ROW = 22, TOP = 6, PAD_BOTTOM = 6;
  const COLORS = ['#c0613a','#1d9e75','#378add','#7f77dd','#d4537e','#ba7517','#639922','#0f6e56','#993c1d','#185fa5','#534ab7','#993556','#854f0b','#3b6d11','#085041','#d85a30','#1d9e75','#7f77dd','#378add','#c0613a'];
  const X = c => COL/2 + c*COL;
  const esc = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  let n = 6, w = 1, names = [], rungs = [], winners = new Set(), revealed = new Set(), traces = new Map(), editMode = false;

  const rowsForN = nn => Math.max(10, Math.round(nn*1.7));

  function generateRungs(nn){
    const rows = rowsForN(nn), R = [];
    for(let r=0;r<rows;r++){
      const row = new Array(nn-1).fill(false);
      for(let c=0;c<nn-1;c++){
        if(c>0 && row[c-1]) continue;
        if(Math.random()<0.45) row[c]=true;
      }
      R.push(row);
    }
    return R;
  }

  function trace(start){
    const rows = rungs.length, pts = [[X(start), TOP]];
    let pos = start;
    for(let r=0;r<rows;r++){
      const y = TOP + (r+0.5)*ROW;
      let np = pos;
      if(pos>0 && rungs[r][pos-1]) np = pos-1;
      else if(pos<n-1 && rungs[r][pos]) np = pos+1;
      if(np!==pos){ pts.push([X(pos), y]); pts.push([X(np), y]); pos = np; }
    }
    pts.push([X(pos), TOP + rows*ROW]);
    return { end: pos, pts };
  }

  function pickWinners(){
    winners = new Set();
    const idx = [...Array(n).keys()];
    for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
    for(let i=0;i<w;i++) winners.add(idx[i]);
  }

  function resetNames(){
    const old = names.slice(); names = [];
    for(let i=0;i<n;i++) names[i] = (old[i]!==undefined && old[i]!=='') ? old[i] : String(i+1);
  }

  function newRound(){ resetNames(); pickWinners(); rungs = generateRungs(n); revealed = new Set(); traces = new Map(); render(); }
  function reroll(){ rungs = generateRungs(n); revealed = new Set(); traces = new Map(); render(); }

  function svgEl(tag, attrs){
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function polyLen(pts){ let L=0; for(let i=1;i<pts.length;i++) L += Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1]); return Math.round(L); }
  function outcomeFor(p){ return winners.has(trace(p).end); }

  function render(){
    const rows = rungs.length, innerW = n*COL, bottomY = TOP + rows*ROW, h = bottomY + PAD_BOTTOM;
    $('#ld-boardInner').style.width = innerW + 'px';
    const svg = $('#ld-svg');
    svg.setAttribute('viewBox', `0 0 ${innerW} ${h}`);
    svg.setAttribute('width', innerW); svg.setAttribute('height', h);
    svg.innerHTML = '';
    for(let c=0;c<n;c++) svg.appendChild(svgEl('line', {x1:X(c), y1:TOP, x2:X(c), y2:bottomY, stroke:'var(--vline)', 'stroke-width':2, 'stroke-linecap':'round'}));
    for(let r=0;r<rows;r++){
      const y = TOP + (r+0.5)*ROW;
      for(let c=0;c<n-1;c++) if(rungs[r][c]) svg.appendChild(svgEl('line', {x1:X(c), y1:y, x2:X(c+1), y2:y, stroke:'var(--line)', 'stroke-width':2.5, 'stroke-linecap':'round'}));
    }
    for(const [p, info] of traces){
      const {pts} = trace(p);
      const poly = svgEl('polyline', {points: pts.map(q=>q.join(',')).join(' '), fill:'none', stroke:info.color, 'stroke-width':3.5, 'stroke-linecap':'round', 'stroke-linejoin':'round', opacity:0.95});
      const len = polyLen(pts);
      poly.setAttribute('stroke-dasharray', len);
      poly.setAttribute('stroke-dashoffset', len);
      svg.appendChild(poly);
      requestAnimationFrame(()=>{ poly.style.transition='stroke-dashoffset .6s ease'; poly.setAttribute('stroke-dashoffset', 0); });
    }
    renderNames(); renderResults(); renderSummary();
    $('#ld-winInfo').textContent = `총 ${n}명 · 당첨 ${w}`;
  }

  function renderNames(){
    const row = $('#ld-namesRow'); row.innerHTML = '';
    for(let i=0;i<n;i++){
      const cell = document.createElement('div');
      cell.className = 'ld-cell'; cell.style.flex = `0 0 ${COL}px`; cell.style.padding = '0 3px 8px';
      if(editMode){
        const inp = document.createElement('input');
        inp.className = 'ld-name-input'; inp.value = names[i]; inp.maxLength = 6;
        inp.oninput = e => { names[i] = e.target.value; };
        cell.appendChild(inp);
      } else {
        const b = document.createElement('button');
        b.className = 'ld-name-btn'; b.textContent = names[i] || (i+1);
        if(traces.has(i)){ b.style.borderColor = traces.get(i).color; b.style.color = traces.get(i).color; }
        b.onclick = ()=> toggleTrace(i);
        cell.appendChild(b);
      }
      row.appendChild(cell);
    }
  }

  function renderResults(){
    const row = $('#ld-resRow'); row.innerHTML = '';
    for(let c=0;c<n;c++){
      const cell = document.createElement('div');
      cell.className = 'ld-cell'; cell.style.flex = `0 0 ${COL}px`; cell.style.padding = '8px 3px 0';
      const d = document.createElement('div');
      if(revealed.has(c)){ const win = winners.has(c); d.className = 'ld-res ' + (win?'win':'miss'); d.textContent = win ? '당첨' : '꽝'; }
      else { d.className = 'ld-res'; d.textContent = '?'; }
      cell.appendChild(d); row.appendChild(cell);
    }
  }

  function renderSummary(){
    if(traces.size===0){ $('#ld-summaryCard').style.display='none'; return; }
    $('#ld-summaryCard').style.display='block';
    const box = $('#ld-summary'); box.innerHTML = '';
    for(const p of [...traces.keys()].sort((a,b)=>a-b)){
      const win = outcomeFor(p);
      const r = document.createElement('div'); r.className = 'ld-summary-row';
      const left = document.createElement('span');
      left.innerHTML = `<i class="ld-dot" style="background:${traces.get(p).color};margin-right:8px"></i>${esc(names[p]||String(p+1))}`;
      const right = document.createElement('span'); right.className = 'ld-pill ' + (win?'win':'miss'); right.textContent = win ? '당첨' : '꽝';
      r.appendChild(left); r.appendChild(right); box.appendChild(r);
    }
  }

  function toggleTrace(p){
    if(editMode) return;
    if(traces.has(p)) traces.delete(p);
    else { traces.set(p, { color: COLORS[p % COLORS.length] }); revealed.add(trace(p).end); }
    render();
    $('#ld-hint').textContent = traces.size ? '다시 탭하면 경로가 사라져요' : '이름을 탭하면 결과가 공개됩니다';
  }

  function revealAll(){
    for(let p=0;p<n;p++){ if(!traces.has(p)) traces.set(p, { color: COLORS[p % COLORS.length] }); revealed.add(trace(p).end); }
    render(); $('#ld-hint').textContent = '전체 결과 공개됨';
  }

  function clearTraces(){ traces = new Map(); revealed = new Set(); render(); $('#ld-hint').textContent = '이름을 탭하면 결과가 공개됩니다'; }

  function setN(v){ n = Math.max(2, Math.min(20, v)); if(w > n-1) w = n-1; $('#ld-nVal').textContent = n; $('#ld-wVal').textContent = w; newRound(); }
  function setW(v){ w = Math.max(1, Math.min(n-1, v)); $('#ld-wVal').textContent = w; pickWinners(); revealed = new Set(); traces = new Map(); render(); }

  $('#ld-nMinus').onclick = ()=> setN(n-1);
  $('#ld-nPlus').onclick  = ()=> setN(n+1);
  $('#ld-wMinus').onclick = ()=> setW(w-1);
  $('#ld-wPlus').onclick  = ()=> setW(w+1);
  $('#ld-reroll').onclick = reroll;
  $('#ld-revealAll').onclick = revealAll;
  $('#ld-clear').onclick = clearTraces;
  $('#ld-edit').onclick = ()=>{
    editMode = !editMode;
    $('#ld-edit').classList.toggle('primary', editMode);
    $('#ld-edit').querySelector('span').textContent = editMode ? '완료' : '이름 수정';
    $('#ld-hint').textContent = editMode ? '칸을 눌러 이름을 입력하세요' : '이름을 탭하면 결과가 공개됩니다';
    render();
  };

  newRound();
})();

async function init(){
  try{
    const bust = '?t=' + Date.now();
    const [sRes, mRes] = await Promise.all([
      fetch('schedule.json' + bust),
      fetch('meals.json' + bust),
    ]);
    const schedule = await sRes.json();
    const meals = await mRes.json();
    delete meals._comment;
    DATA = { schedule, meals };
    serverToday = kstToday();
    cur = new Date(serverToday);
    buildStrip();
    renderAll();
  }catch(e){
    $('#pane-lecture').innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
}
init();
